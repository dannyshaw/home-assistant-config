- id: '1746790764389'
  alias: Toothbrushing Reminder
  description: ''
  triggers:
  - at: 07:39:00
    trigger: time
  conditions: []
  actions:
  - action: openai_conversation.generate_content
    data:
      prompt: "My daughters need to brush their teeth. \nTheir names are Ada and Leni.
        They are 6 and 3 years old.\nI need a message to send to my home automation
        system to notify over a speaker. \nmake it funny and novel and appropriate
        to their age.\nResponse with at most one response, it should not list options
        or have any other surrounding text, \njust the message for the girls. keep
        it short and sweet, and funny.\nAlways begin with a greeting to the two girls\nNo
        emojis, no asrerisk or underscores, you're writing a script for a tts.\nMix
        it up, DO NOT always talk about being super heros fighting cavities or sugarbugs/monsters
        etc, .. sometimes just tell them to brush their teeth  with humour, perhaps
        even sarcasm\n\n"
      config_entry: 01JTTBH3JQ7CYM3YMM4EJGNMWK
    response_variable: message
  - action: media_player.volume_set
    metadata: {}
    data:
      volume_level: 0.7
    target:
      entity_id: media_player.kitchen_home
  - action: tts.amazon_polly_say
    metadata: {}
    data:
      cache: false
      entity_id: media_player.kitchen_home
      message: '{{message.text}}'
      options:
        voice: Amy
        engine: generative
      language: en-GB
  mode: single
- id: '1746827000348'
  alias: Joke Time
  description: ''
  triggers:
  - at: '17:50:00'
    trigger: time
  conditions: []
  actions:
  - action: openai_conversation.generate_content
    data:
      config_entry: 01JTTBH3JQ7CYM3YMM4EJGNMWK
      prompt: 'Tell a joke suitable for a 6 year old.

        '
    response_variable: message
  - action: media_player.volume_set
    metadata: {}
    data:
      volume_level: 0.6
    target:
      entity_id: media_player.kitchen_home
  - action: tts.amazon_polly_say
    metadata: {}
    data:
      entity_id: media_player.kitchen_home
      message: '{{message.text}}'
      language: en-GB
      options:
        voice: Amy
        engine: generative
  - action: media_player.volume_set
    metadata: {}
    data:
      volume_level: 0.5
    target:
      entity_id: media_player.kitchen_home
  mode: single
